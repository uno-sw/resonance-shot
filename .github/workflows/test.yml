name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Verify mise lockfile
        run: git diff --exit-code -- mise.lock

      - name: Check formatting
        run: mise run format:check

  test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate toolchain fingerprint
        id: toolchain
        run: |
          fingerprint="$(
            {
              cmake --version
              xcodebuild -version
              c++ --version
            } | shasum -a 256 | cut -d ' ' -f 1
          )"
          echo "fingerprint=${fingerprint}" >> "${GITHUB_OUTPUT}"

      - name: Restore CMake build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: build
          key: >-
            cmake-${{ runner.os }}-${{ runner.arch }}-${{
            steps.toolchain.outputs.fingerprint }}-${{
            hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel 3

      - name: Test
        run: ctest --test-dir build --output-on-failure
